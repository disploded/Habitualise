<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitualise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Habitualise</h1>

    <div id="button-container">
        <button id="minimize">Hide</button>
        <button id="edit">Edit</button>
        <button id="forceQuit">Force Quit</button>
    </div>

    <div id="tasks">
        <table id="task-table">

        </table>
    </div>
</body>
</html>

<script>
    async function init() {
        // Wait for the main process to send the tasks
        const tasks = await window.api.getTasks();
        renderTasks(tasks);
    }

    function renderTasks(tasks) {
        const table = document.getElementById("task-table");
        table.innerHTML = "";

        tasks.forEach(item => {
            const row = document.createElement("tr");
            const cell = document.createElement("td");

            // span for styling
            const textSpan = document.createElement("span");
            textSpan.textContent = item.task;
            if (item.done) textSpan.classList.add("completed");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";

            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    textSpan.classList.add("completed");
                    item.done = true;
                } else {
                    textSpan.classList.remove("completed");
                    item.done = false;
                }
            });

            cell.appendChild(textSpan);
            cell.appendChild(checkbox);

            row.appendChild(cell);
            table.appendChild(row);
        });
    }

    const minimizeBtn = document.getElementById('minimize');
    minimizeBtn.addEventListener('click', () => {
        window.api.minimizeApp();
    })

    const editBtn = document.getElementById('edit')
    editBtn.addEventListener('click', () => {
        window.api.changePage('edit.html');
    })
    
    const quitBtn = document.getElementById('forceQuit')
    quitBtn.addEventListener('click', () => {
        window.api.quitApp();
    })

    init();
</script>
